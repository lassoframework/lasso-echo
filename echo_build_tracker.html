<!-- Echo Master Tracker — build status + full progress in one. LASSO V3 brand-locked. Self-contained. -->
<div id="echo-status"></div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  #echo-status, #echo-status * { box-sizing: border-box; margin: 0; padding: 0; }
  #echo-status {
    --navy:#121E3C; --navy2:#1B326E; --red:#FF0000; --sky:#5EB9E6;
    --white:#FFFFFF; --steel:#D8E3EE; --muted:rgba(216,227,238,.32);
    font-family:'Inter',Helvetica,Arial,sans-serif;
    background:var(--navy); color:var(--white);
    padding:40px 34px 44px; border-radius:16px; max-width:1000px; margin:0 auto;
    -webkit-font-smoothing:antialiased;
  }

  /* header */
  #echo-status .eyebrow{ font-size:12px; font-weight:800; letter-spacing:.26em; text-transform:uppercase; color:var(--sky); }
  #echo-status .title{ font-size:46px; font-weight:900; line-height:.98; letter-spacing:-.02em; margin:8px 0 6px; }
  #echo-status .title .a{ color:var(--red); }
  #echo-status .deck{ font-size:14px; font-weight:500; color:var(--steel); letter-spacing:.01em; }
  #echo-status .deck .dot{ color:var(--red); font-weight:900; padding:0 8px; }

  /* legend */
  #echo-status .legend{ display:flex; gap:18px; margin-top:16px; flex-wrap:wrap; }
  #echo-status .legend .lg{ display:flex; align-items:center; gap:7px; font-size:11px; font-weight:700; color:var(--steel); letter-spacing:.04em; }
  #echo-status .legend .sw{ width:14px; height:14px; border-radius:4px; border:2px solid var(--muted); }
  #echo-status .legend .sw.done{ background:var(--sky); border-color:var(--sky); }
  #echo-status .legend .sw.ready{ border-color:var(--red); }

  /* phase rail (signature) */
  #echo-status .rail-wrap{ margin:32px 0 34px; }
  #echo-status .rail-label{ font-size:11px; font-weight:800; letter-spacing:.22em; text-transform:uppercase; color:var(--steel); margin-bottom:20px; }
  #echo-status .rail{ display:grid; grid-template-columns:repeat(5,1fr); position:relative; }
  #echo-status .rail::before{ content:""; position:absolute; left:10%; right:10%; top:23px; height:3px; background:var(--muted); border-radius:99px; }
  #echo-status .node{ position:relative; text-align:center; }
  #echo-status .node .seg{ position:absolute; top:23px; height:3px; left:-50%; right:50%; z-index:1; }
  #echo-status .node:first-child .seg{ display:none; }
  #echo-status .node .disc{
    position:relative; z-index:2; width:48px; height:48px; border-radius:50%;
    margin:0 auto 12px; display:grid; place-items:center;
    font-size:18px; font-weight:900; background:var(--navy);
    border:3px solid var(--muted); color:var(--steel);
  }
  #echo-status .node.done .disc{ background:var(--sky); border-color:var(--sky); color:var(--navy); }
  #echo-status .node.active .disc{ border-color:var(--red); color:var(--white); box-shadow:0 0 0 6px rgba(255,0,0,.16); }
  #echo-status .node .nm{ font-size:12.5px; font-weight:800; line-height:1.2; }
  #echo-status .node .pc{ font-size:11px; font-weight:700; color:var(--steel); margin-top:3px; }
  #echo-status .node.done .pc{ color:var(--sky); }
  #echo-status .node.active .pc{ color:var(--red); }
  #echo-status .youarehere{ display:inline-block; margin-top:7px; font-size:9px; font-weight:900; letter-spacing:.16em; text-transform:uppercase; background:var(--red); color:var(--white); padding:3px 7px; border-radius:99px; }

  /* summary tiles */
  #echo-status .tiles{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  #echo-status .tile{ background:var(--white); color:var(--navy); border-radius:12px; padding:18px 16px; }
  #echo-status .tile .k{ font-size:10.5px; font-weight:800; letter-spacing:.13em; text-transform:uppercase; color:#5c6b86; }
  #echo-status .tile .v{ font-size:30px; font-weight:900; line-height:1; margin-top:8px; letter-spacing:-.02em; }
  #echo-status .tile .v.red{ color:var(--red); } #echo-status .tile .v.sky{ color:#2f7fb0; }
  #echo-status .tile .v.small{ font-size:19px; }
  #echo-status .tile .vs{ font-size:13px; font-weight:700; color:#5c6b86; margin-top:6px; }

  /* next moves */
  #echo-status .next{ margin-top:24px; background:var(--white); border-radius:12px; overflow:hidden; }
  #echo-status .next .cap{ background:var(--red); color:var(--white); padding:12px 18px; font-size:12px; font-weight:900; letter-spacing:.13em; text-transform:uppercase; }
  #echo-status .next ol{ list-style:none; padding:6px 18px 14px; }
  #echo-status .next li{ display:flex; gap:12px; align-items:baseline; padding:9px 0; border-top:1px solid #eef2f7; color:var(--navy); }
  #echo-status .next li:first-child{ border-top:none; }
  #echo-status .next .n{ flex:0 0 22px; font-size:14px; font-weight:900; color:var(--red); }
  #echo-status .next .t{ font-size:14px; font-weight:600; line-height:1.35; }
  #echo-status .next .by{ margin-left:auto; flex:0 0 auto; font-size:9.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:#8a96aa; align-self:center; white-space:nowrap; }

  /* section label */
  #echo-status .seclabel{ margin:34px 0 2px; font-size:11px; font-weight:800; letter-spacing:.22em; text-transform:uppercase; color:var(--sky); }

  /* stage detail grid */
  #echo-status .grid{ margin-top:16px; display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  #echo-status .card{ background:var(--navy2); border-radius:12px; padding:18px; }
  #echo-status .card.full{ grid-column:1 / -1; }
  #echo-status .card > header{ display:flex; align-items:center; gap:14px; margin-bottom:14px; }
  #echo-status .card h3{ font-size:15px; font-weight:800; line-height:1.15; }
  #echo-status .card .cmeta{ font-size:11.5px; font-weight:600; color:var(--steel); margin-top:3px; }
  #echo-status .card .badge{ margin-left:auto; flex:0 0 auto; font-size:9px; font-weight:900; letter-spacing:.13em; text-transform:uppercase; padding:4px 9px; border-radius:99px; align-self:flex-start; }
  #echo-status .badge.next{ background:var(--red); color:#fff; }
  #echo-status .badge.watch{ background:rgba(255,0,0,.16); color:#ff6b6b; border:1px solid rgba(255,0,0,.4); }
  #echo-status .badge.spec{ background:rgba(94,185,230,.18); color:var(--sky); border:1px solid rgba(94,185,230,.4); }
  #echo-status .tasks{ list-style:none; }
  #echo-status .tasks li{ display:flex; gap:10px; align-items:flex-start; padding:7px 0; border-top:1px solid rgba(255,255,255,.07); font-size:13px; line-height:1.38; cursor:pointer; }
  #echo-status .tasks li:first-child{ border-top:none; }
  #echo-status .tasks li:focus-visible{ outline:2px solid var(--sky); outline-offset:3px; border-radius:4px; }
  #echo-status .chk{ flex:0 0 18px; width:18px; height:18px; border-radius:5px; margin-top:1px; border:2px solid var(--muted); display:grid; place-items:center; font-size:11px; font-weight:900; color:transparent; }
  #echo-status .tasks li.done .chk{ background:var(--sky); border-color:var(--sky); color:var(--navy); }
  #echo-status .tasks li.ready .chk{ border-color:var(--red); color:var(--red); }
  #echo-status .tasks li.done .tt{ color:var(--steel); text-decoration:line-through; text-decoration-color:var(--muted); }
  #echo-status .tasks li .tt{ flex:1; }
  #echo-status .card.deferred{ background:transparent; border:1.5px dashed var(--muted); }
  #echo-status .card.deferred h3{ color:var(--steel); }

  /* risks */
  #echo-status .risk{ list-style:none; }
  #echo-status .risk li{ display:flex; gap:11px; align-items:flex-start; padding:10px 0; border-top:1px solid rgba(255,255,255,.07); font-size:13px; line-height:1.42; color:var(--steel); }
  #echo-status .risk li:first-child{ border-top:none; }
  #echo-status .risk li b{ color:var(--white); font-weight:800; }
  #echo-status .risk .ic{ flex:0 0 18px; width:18px; height:18px; border-radius:5px; background:var(--red); color:#fff; font-weight:900; font-size:12px; display:grid; place-items:center; margin-top:1px; }

  /* reporting pills */
  #echo-status .report{ display:flex; flex-wrap:wrap; gap:8px; }
  #echo-status .report .pill{ background:rgba(94,185,230,.14); color:var(--sky); border:1px solid rgba(94,185,230,.3); border-radius:99px; padding:7px 13px; font-size:12px; font-weight:700; }

  #echo-status .foot{ margin-top:26px; text-align:center; font-size:10.5px; font-weight:600; letter-spacing:.05em; color:var(--steel); }

  @media (max-width:720px){
    #echo-status{ padding:28px 18px 32px; }
    #echo-status .title{ font-size:34px; }
    #echo-status .rail{ grid-template-columns:1fr; gap:4px; }
    #echo-status .rail::before{ display:none; }
    #echo-status .node{ display:grid; grid-template-columns:48px 1fr; align-items:center; text-align:left; gap:14px; padding:4px 0; }
    #echo-status .node .seg{ display:none; }
    #echo-status .node .disc{ margin:0; }
    #echo-status .tiles{ grid-template-columns:repeat(2,1fr); }
    #echo-status .grid{ grid-template-columns:1fr; }
  }
  @media (prefers-reduced-motion:no-preference){
    #echo-status .seg, #echo-status .ringfg{ transition:all .4s ease; }
  }
</style>

  // Stage 3 reporting spec (per account, per 30-day cycle)

  const CLIENT_INTAKE={ name:"Client Intake \u2014 portal upload + WhatsApp", meta:"Stage 2. Primary path is a per-gym branded portal upload page (full-res direct to R2, no carrier compression). WhatsApp is the secondary path via WABA. Both flow into the same ingest worker. It is the client's own media and words, so fabrication risk stays near zero.",
    items:[

  // Creative Studio — generated assets, flagged and default OFF (Stage 2 & 3)
  const CREATIVE_STUDIO={ name:"Creative Studio \u2014 generated assets", meta:"Flagged, default OFF. Every output is a draft that still needs your tap. One flag per generator.",
    items:[
      "Opus Clip factory (SHIPPED, flag AGENT_OPUS_FACTORY_ENABLED OFF): all-COLLECTION scan (no allowlist), score floor 90 first, transcript bucket tagger, hook check, evergreen caption from transcript + approved facts only, no-repost ledger, calendar routing with a per-week cap; candidate Reels out as DRAFTS held for the tap. CLI: agent opus-pull [--write]. Auth guard + route fix shipped (2026-07-09): OpusScanError surfaces non-2xx loudly; opus-doctor separates 404 (endpoint wrong) from 401 (auth wrong); call-time key reads. Route fix: the scan was hitting the invented GET /api/projects (404); corrected to the proven GET /api/collections route (the legacy pull-opus poller was the source of truth; base URL + auth were always right). Shape fix: the live /api/collections returns an ID-KEYED DICT under data ({data:{<id>:{...}}}), not a list, which crashed opus-doctor on items[0]; a single normalize_list_response now flattens any shape (list, wrapper, id-keyed dict, empty) for both the scan and the doctor. Organize: opus-doctor got 200 but 0 collections because clips live in projects, never added to a collection; new agent opus-organize (dry-run default, --write) creates a target collection and adds each pinned project's finished clips (POST /api/collections + POST /api/collection-contents, one clip per call), idempotent; opus-doctor now prints per-collection name + clip count. KNOWN GAP: the Opus API returns no clip score, so the factory score floor (90) benches everything until scoring is solved. BLAKE BY HAND: set OPUS_API_KEY + AGENT_OPUS_PROJECT_IDS in Railway, run opus-organize (dry then --write), then opus-doctor to confirm the collection clip count.",
      "Native clipper END TO END (SHIPPED DARK, all flags OFF): Phase 0 prereq detection (detect_prereqs, render flag scaffold). Phase 1 SELECTION (intake, word-level transcription cached, Claude moment selection with fabrication gate, dry-run plan). Phase 2 RENDER (cut_segment stream-copy, frame_vertical 9:16 fill-scale or audiogram, burn_captions ASS word-by-word karaoke from word timestamps, add_brand_frame navy lower-third + red handle; all behind AGENT_CLIPPER_RENDER_ENABLED). Phase 3 WIRE (save_clip_draft creates PENDING held draft with Slack card, always full-approval regardless of trust ladder, evergreen warning, source=clipper/kind=reel in source_fragments; log_episode_cost writes token+transcribe cost to db kv for $99 SKU margin check). ffmpeg 8.1.2 present. faster-whisper NOT installed. BLAKE BY HAND (to arm): set AGENT_CLIPPER_ENABLED, AGENT_HOSTING_ENABLED + R2, ANTHROPIC_API_KEY, install faster-whisper OR set AGENT_TRANSCRIBE_API_KEY. Run clip-episode --source <episode.mp4> to get the plan. Set AGENT_CLIPPER_RENDER_ENABLED to arm Phase 2.",
      "Episode inbox watcher + Monday nudge (SHIPPED DARK, flag AGENT_EPISODE_INBOX_ENABLED OFF): Polling watcher inside the existing listener (no new infra). Human workflow: export from Riverside, drop file in echo/episode_inbox/<tenant>/. On arrival: size-stability guard (same size across two polls = upload finished), exactly-once claim (kv marker, survives restarts), Phase 1 clip selection runs, ranked plan posted to Slack #echoclaude as a held plan message (NOTHING renders, NOTHING posts). Plan header includes RSS episode number, title, publish date from the podcast_episodes DB. Evergreen guard rejects recency phrases in plan output. Monday 9am nudge: if the newest RSS episode is within AGENT_EPISODE_NUDGE_WINDOW_DAYS (default 2) and no inbox file has been matched, posts one nudge to #echoclaude with episode info and inbox path. Idempotent per episode per day. agent inbox-status CLI. 39 tests green. BLAKE BY HAND (to arm): AGENT_EPISODE_INBOX_ENABLED=true, AGENT_HOSTING_ENABLED + R2, AGENT_CLIPPER_ENABLED, AGENT_PODCAST_FEED_URL. Optional: AGENT_EPISODE_INBOX_PREFIX, AGENT_EPISODE_INBOX_POLL_MINUTES, AGENT_EPISODE_NUDGE_TIME, AGENT_EPISODE_NUDGE_WINDOW_DAYS.",
      "Nano Banana infographics (Stage 3): visualize ONLY approved facts from the bible or client note; V3 brand kit locked as the reference",
      "AI images carry a SynthID watermark; always verify data-driven output",
      "Cost line: per-image (Nano Banana) + per-minute (Opus) priced into the $99 SKU",
  ]};

  // Full build spec (from the A-Plus Build Specification, folded in July 2026).
  // The complete organic-system scope. Reference doc lives at BUILD_SPEC.md.
  const ARCH={ name:"Full build spec \u2014 the organic system", meta:"From the A-Plus Build Specification. The complete scope Echo grows into. Canonical doc: BUILD_SPEC.md in the repo. Everything here plugs onto the proven Stage 1 core.",
    groups:[
      { title:"Ingestion pipeline", items:[
        "Texted short link is primary; MMS + portal upload are fallbacks",
        "Event-driven: webhook to queue to idempotent Railway worker (safe to retry)",
        "Convert HEIC to JPEG/AVIF and MOV to MP4; always keep the original",
        "Dedupe: SHA-256 exact + perceptual hash for near-dupes",
        "AV + image moderation on ingest; auto-reject clear, flag borderline",
        "Thumbnails/posters generated in the worker, never in a web request",
        "Dead-letter queue with exponential backoff",
      ]},
      { title:"Creative library / DAM", items:[
        "Asset row: tenant, storage keys, type, hashes, EXIF, AI tags + confidence",
        "AI auto-tag + auto-caption; low-confidence tags go to a human review queue",
        "Member-photo CONSENT tracking: face-detect flags, release required to publish",

      ]},
      { title:"Creative runway", items:[
        "Days of content left = unused approved assets / posts per day",
        "Count only approved, moderation-clean, consent-cleared, unposted assets",
        "One glanceable card: big number, green/amber/red, projected zero-date",
        "Below threshold (default ~7 days): agent texts a specific request, debounced",
      ]},
      { title:"Agent (Claude Agent SDK)", items:[
        "Model routing: Opus 4.8 judgment, Sonnet 4.6 copy, Haiku 4.5 classification",
        "Read tools: library, runway, performance, brand profile, schedule",
        "Act tools (gated): draft, schedule, generate, text client, request creative, report",
        "Per-gym memory: always-in-context core + retrieval + consolidated learnings",
        "Approval gates enforced with PreToolUse hooks; full decision audit log",
        "Subagents/skills: tagging, copywriting (SB7), analyst, runway-guardian",
      ]},
      { title:"Platform + reporting", items:[
        "Supabase RLS keyed to Clerk org claims = hard multi-tenant isolation",
        "Idempotency keys everywhere; rate-limit-aware GHL + Meta clients",
        "Reporting from Meta Graph, on views not impressions, daily snapshots cached",
        "White-label in-portal dashboard + scheduled branded PDF, mobile first",
        "One place for the client: library, runway, and reporting together",
        "Three publishing channels: Instagram, Facebook, Google Business Profile; GBP is its own draft-only branch (gbp_publisher), IG/FB via meta_publisher",
      ]},
    ]};

  const root=document.getElementById("echo-status");
  const done=s=>s.items.filter(i=>i[1]==="done").length;
  const pct=s=>Math.round((done(s)/s.items.length)*100);

  function ring(p,color){
    const r=21,c=2*Math.PI*r,off=c*(1-p/100);
    return `<svg width="54" height="54" viewBox="0 0 54 54" style="flex:0 0 auto">
      <circle cx="27" cy="27" r="${r}" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="5"/>
      <circle class="ringfg" cx="27" cy="27" r="${r}" fill="none" stroke="${color}" stroke-width="5"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 27 27)"/>
      <text x="27" y="31" text-anchor="middle" fill="#fff" font-size="13" font-weight="900" font-family="Inter,Helvetica,Arial">${p}%</text>
    </svg>`;
  }

  function render(){
    let tot=0,dn=0;
    STAGES.forEach(s=>{tot+=s.items.length;dn+=done(s);});
    const overall=Math.round((dn/tot)*100);
    let activeIdx=STAGES.findIndex(s=>pct(s)<100);
    if(activeIdx<0) activeIdx=STAGES.length-1;

    let h=`<p class="eyebrow">LASSO Framework</p>
      <h1 class="title">Echo <span class="a">Master</span> Tracker</h1>
      <p class="deck">Build status + full progress<span class="dot">/</span>Draft-only<span class="dot">/</span>Publishing not armed</p>
      <div class="legend">
        <span class="lg"><span class="sw done"></span>Done</span>
        <span class="lg"><span class="sw ready"></span>Built, push pending</span>
        <span class="lg"><span class="sw"></span>To do</span>
      </div>`;

    // rail
    h+=`<div class="rail-wrap"><p class="rail-label">The Path</p><div class="rail">`;
    STAGES.forEach((s,i)=>{
      const p=pct(s);
      const state=p===100?"done":(i===activeIdx?"active":"");
      const segColor=(i>0 && pct(STAGES[i-1])===100)?"var(--sky)":"var(--muted)";
      h+=`<div class="node ${state}">
        ${i>0?`<span class="seg" style="background:${segColor}"></span>`:""}
        <div class="disc">${p===100?"&#10003;":s.n}</div>
        <div><div class="nm">${s.short}</div><div class="pc">${p}%</div>
        ${i===activeIdx?`<span class="youarehere">You are here</span>`:""}</div>
      </div>`;
    });
    h+=`</div></div>`;

    // tiles
    h+=`<div class="tiles">
      <div class="tile"><div class="k">Overall</div><div class="v red">${overall}%</div><div class="vs">${dn} of ${tot} items</div></div>
      <div class="tile"><div class="k">Current phase</div><div class="v small">Stage ${STAGES[activeIdx].n}</div><div class="vs">${STAGES[activeIdx].short}</div></div>
      <div class="tile"><div class="k">2026 Growth pack</div><div class="v sky small">Shipped</div><div class="vs">Live in drafts</div></div>
      <div class="tile"><div class="k">Publishing</div><div class="v small">Draft-only</div><div class="vs">Flag OFF, by design</div></div>
    </div>`;

    // next moves
    const blockers=STAGES[activeIdx].items.filter(i=>i[1]==="todo").slice(0,5);
    h+=`<div class="next"><div class="cap">Next moves &middot; Stage ${STAGES[activeIdx].n}</div><ol>`;
    blockers.forEach((b,i)=>{
      const byhand=/Meta App|tokens|GitHub|Railway|Slack|approved by Blake|Host creative|Rename|redeploy/.test(b[0]);
      h+=`<li><span class="n">${i+1}</span><span class="t">${b[0]}</span><span class="by">${byhand?"By hand":"Build"}</span></li>`;
    });
    if(!blockers.length){ h+=`<li><span class="n">&#10003;</span><span class="t">This stage is clear. Advance to the next phase.</span></li>`; }
    h+=`</ol></div>`;

    // stage cards
    h+=`<p class="seclabel">The Build &middot; Stage by Stage</p>`;
    h+=`<div class="grid">`;
    STAGES.forEach((s,si)=>{
      const p=pct(s);
      const col=p===100?"var(--sky)":"var(--red)";
      h+=`<div class="card"><header>${ring(p,col)}<div><h3>${s.name}</h3><div class="cmeta">${s.meta} &middot; ${done(s)}/${s.items.length}</div></div></header><ul class="tasks">`;
      s.items.forEach((it,ii)=>{
        const cls=it[1]==="done"?"done":it[1]==="ready"?"ready":"";
        const mark=it[1]==="done"?"&#10003;":it[1]==="ready"?"&bull;":"";
        h+=`<li class="${cls}" tabindex="0" role="button" data-s="${si}" data-i="${ii}"><span class="chk">${mark}</span><span class="tt">${it[0]}</span></li>`;
      });
      h+=`</ul></div>`;
    });

    // roadmap card
    h+=`<div class="card"><header><div><h3>${ROADMAP.name}</h3><div class="cmeta">${ROADMAP.meta}</div></div><span class="badge next">Next up</span></header><ul class="tasks">`;
    ROADMAP.items.forEach(t=>{ h+=`<li style="cursor:default"><span class="chk" style="border-color:var(--red)"></span><span class="tt">${t}</span></li>`; });
    h+=`</ul></div>`;

    // deferred stubs
    h+=`<div class="card deferred full"><header><div><h3>${STUBS.name}</h3><div class="cmeta">${STUBS.meta}</div></div></header><ul class="tasks">`;
    STUBS.items.forEach(t=>{ h+=`<li style="cursor:default"><span class="chk"></span><span class="tt" style="color:var(--steel)">${t}</span></li>`; });
    h+=`</ul></div>`;

    // risks
    h+=`<div class="card full"><header><div><h3>${RISKS.name}</h3><div class="cmeta">${RISKS.meta}</div></div><span class="badge watch">Watch</span></header><ul class="risk">`;
    RISKS.items.forEach(r=>{ h+=`<li><span class="ic">!</span><span><b>${r[0]}:</b> ${r[1]}</span></li>`; });
    h+=`</ul></div>`;

    // reporting spec
    h+=`<div class="card full"><header><div><h3>${REPORTING.name}</h3><div class="cmeta">${REPORTING.meta}</div></div><span class="badge spec">Stage 3</span></header><div class="report">`;
    REPORTING.metrics.forEach(m=>{ h+=`<span class="pill">${m}</span>`; });
    h+=`</div></div>`;

    // client intake (Stage 2)
    h+=`<div class="card full"><header><div><h3>${CLIENT_INTAKE.name}</h3><div class="cmeta">${CLIENT_INTAKE.meta}</div></div><span class="badge spec">Stage 2</span></header><ul class="tasks">`;
    CLIENT_INTAKE.items.forEach(t=>{ h+=`<li style="cursor:default"><span class="chk"></span><span class="tt">${t}</span></li>`; });
    h+=`</ul></div>`;

    // creative studio (Stage 2 & 3, flagged)
    h+=`<div class="card full"><header><div><h3>${CREATIVE_STUDIO.name}</h3><div class="cmeta">${CREATIVE_STUDIO.meta}</div></div><span class="badge next">Flagged</span></header><ul class="tasks">`;
    CREATIVE_STUDIO.items.forEach(t=>{ h+=`<li style="cursor:default"><span class="chk"></span><span class="tt">${t}</span></li>`; });
    h+=`</ul></div>`;

    // full build spec (the organic system) — folded in from the A-Plus spec
    h+=`<div class="card full"><header><div><h3>${ARCH.name}</h3><div class="cmeta">${ARCH.meta}</div></div><span class="badge spec">Spec</span></header></div>`;
    ARCH.groups.forEach(g=>{
      h+=`<div class="card"><header><div><h3>${g.title}</h3></div></header><ul class="tasks">`;
      g.items.forEach(t=>{ h+=`<li style="cursor:default"><span class="chk"></span><span class="tt">${t}</span></li>`; });
      h+=`</ul></div>`;
    });

    h+=`</div>`; // close grid

    h+=`<p class="foot">One master tracker &middot; tap a task to cycle to do &rarr; ready &rarr; done &middot; mirrors PROGRESS.md &middot; full scope in BUILD_SPEC.md &middot; updated 2026-07-16 (scheduler reliability fix: now.hour &gt;= target_hour; run-daily idempotent; scheduler-status CLI; SCHEDULER_CRON.md runbook; library-audit CLI: MISSING/THIN scan + pending-draft cross-check + runner preflight warning; library-audit --all shows lasso_fb MISSING 13 lasso_v2_* planned Jul 17-31 not in library + lasso_ig THIN 1 speed_to_lead stub; 22 new tests; last committed SHA pending; 1331 green; grade B+ unchanged) &middot; this view does not save on reload</p>`;

    root.innerHTML=h;

    root.querySelectorAll('.tasks li[data-s]').forEach(li=>{
      const toggle=()=>{
        const s=+li.dataset.s,i=+li.dataset.i,cur=STAGES[s].items[i][1];
        STAGES[s].items[i][1]= cur==="todo"?"ready":cur==="ready"?"done":"todo";
        render();
      };
      li.addEventListener('click',toggle);
      li.addEventListener('keydown',e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }});
    });
  }
  render();
})();
</script>
